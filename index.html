<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Stick Up Calculator - Nickel Drilling</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <h1>Stick Up Calculator</h1>

  <div class="container">
    <h2>Mode 1: Hitung Stick Up</h2>
    <label>Rod length (m):</label>
    <input type="number" id="rodLength" step="0.01" value="3">

    <label>Number of rods in hole (n):</label>
    <input type="number" id="rodCount" step="1" value="10">

    <label>Measured depth (MD, m):</label>
    <input type="number" id="md" step="0.01" value="27">

    <button onclick="calculateStickUp()">Calculate Stick Up</button>

    <p id="stickUpResult"></p>
  </div>

  <div class="container">
    <h2>Mode 2: Hitung Jumlah Rod</h2>
    <label>Rod length (m):</label>
    <input type="number" id="rodLength2" step="0.01" value="3">

    <label>Measured depth (MD, m):</label>
    <input type="number" id="md2" step="0.01" value="27">

    <label>Measured stick up (m):</label>
    <input type="number" id="stickUpMeasured" step="0.01" value="3">

    <button onclick="calculateRodCount()">Calculate Rod Count</button>

    <p id="rodCountResult"></p>
  </div>

  <script src="script.js"></script>
</body>
</html>
