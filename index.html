<div class="container">
  <h2>Hitung Jumlah Pipa dari MD & Stick Up</h2>

  <label>Tipe pipa:</label>
  <select id="pipeType2">
    <option value="3">3.0 m</option>
    <option value="1.5">1.5 m</option>
  </select>

  <label>Kedalaman bor (MD, m):</label>
  <input type="number" id="md2" step="0.01" value="27">

  <label>Stick up terukur (m):</label>
  <input type="number" id="stickUpMeasured" step="0.01" value="3">

  <button onclick="calculateRodCount()">Hitung Jumlah Pipa</button>

  <p id="rodCountResult"></p>
</div>
