<div class="container">
  <h2>Kalkulator Stick Up</h2>

  <!-- 1. Pemilihan jenis pipa -->
  <label>Jenis pipa (L):</label>
  <select id="pipeType">
    <option value="3">3.0 m</option>
    <option value="1.5">1.5 m</option>
  </select>

  <!-- 2. Input jumlah pipa dan kedalaman -->
  <label>Jumlah pipa (n):</label>
  <input type="number" id="rodCount" step="1" min="0" value="0">

  <label>Kedalaman aktual (D, m):</label>
  <input type="number" id="depth" step="0.01" min="0" value="0">

  <button onclick="calculateStickUp()">Hitung Stick Up</button>

  <!-- 3. Hasil stick up -->
  <p id="stickUpResult"></p>
</div>
